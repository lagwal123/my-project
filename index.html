<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="cal-parent">
            <input type="text" placeholder="0" class="input">
            <div class="cal-child1">
                <div class="cal-red">
                    <button class="bg-red" id="clear" onclick=clear()>C</button>
                    <div id="grey">
                        <button class="bg-grey" id="one" onclick="append(1)">1</button>
                        <button class="bg-grey" id="two" onclick="append(2)">2</button>
                        <button class="bg-grey" id="three" onclick="append(3)">3</button>
                        <button class="bg-grey" id="four" onclick="append(4)">4</button>
                        <button class="bg-grey" id="five" onclick="append(5)">5</button>
                        <button class="bg-grey" id="six" onclick="append(6)">6</button>
                        <button class="bg-grey" id="seven" onclick="append(7)">7</button>
                        <button class="bg-grey" id="eight" onclick="append(8)">8</button>
                        <button class="bg-grey" id="nine" onclick="append(9)">9</button>
                    </div>
                </div>
                <div class="cal-orng">
                    <button class="bg-orng" id="add" onclick="append('+')">+</button>
                    <button class="bg-orng" id="sub" onclick="append('-')">-</button>
                    <button class="bg-orng" id="mul" onclick="append('*')">*</button>
                    <button class="bg-orng" id="divied" onclick="append('/')">/</button>
                </div>
            </div>
            <div class="cal-child2">
                <div class="bg-grey2">
                    <button class="bg-grey" id="zero" onclick="append(0)">0</button>
                    <button class="bg-grey" id="deci" onclick="append('.')">.</button>
                </div>
                <button class="bg-blue" id="equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
